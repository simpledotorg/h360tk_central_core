name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    uses: simpledotorg/h360tk_grafana_core/.github/workflows/deploy-ec2-reusable.yml@main
    with:
      ec2_deploy_path: /home/ec2-user/h360tk_central_core
    secrets:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
