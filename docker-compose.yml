services:
  grafana:
    image: simpledotorg/heart360tk-grafana:${HEART360TK_VERSION}
    container_name: grafana
    ports:
      - 3000:3000
    restart: unless-stopped
    environment:
      - GF_DATABASE_URL=postgres://grafana:ZDI5MGE3YmYyMTRlNGNmYThkMTYyZjk3@postgres:5432/${POSTGRES_DB}
      - GF_SECURITY_ADMIN_PASSWORD=Admin@Heart360

  postgres:
    image: simpledotorg/heart360tk-postgresql:${HEART360TK_VERSION}
    container_name: postgres
    ports:
      - 5432:5432
    restart: unless-stopped
    volumes:
      - ./.database:/var/lib/postgresql/data
    command:
       - postgres
       - -c
       - app.is_central_node=true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "db_prod"]
      interval: 5s
      timeout: 60s
      retries: 5
      start_period: 80s

  sftp:
    image: atmoz/sftp:latest
    container_name: h360tk-sftp
    restart: unless-stopped
    ports:
      - "2222:22"
    volumes:
      - ./sftp_config/users.conf:/etc/sftp/users.conf:ro
      - ./data/sftp-upload:/home/h360tk_sftp/upload


  importer:
    image: simpledotorg/heart360tk-importer:${HEART360TK_VERSION}
    container_name: h360tk-importer
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - IMPORT_CRON=${IMPORT_CRON}
      - IMPORT_PROTOCOL=${IMPORT_PROTOCOL}
      - IMPORT_AGGREAGATE_DATA=${IMPORT_AGGREAGATE_DATA}
      - IMPORT_FOLDER_PATH=${IMPORT_FOLDER_PATH}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SFTP_HOST=${SFTP_HOST}
      - SFTP_PORT=${SFTP_PORT}
      - SFTP_USER=${SFTP_USER}
      - SFTP_PASSWORD=${SFTP_PASSWORD}
      - SFTP_TIMEOUT=${SFTP_TIMEOUT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_KEY_PREFIX=${S3_KEY_PREFIX}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
  